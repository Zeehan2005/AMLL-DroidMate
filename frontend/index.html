<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMLL Lyrics Player</title>
    <link rel="stylesheet" href="./frontend.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            color-scheme: dark;
            font-family: "SF Pro Display", "PingFang SC", system-ui, -apple-system, "Segoe UI", sans-serif;
        }
        html {
            width: 100%;
            height: 100%;
            background: transparent;
        }
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
        #app {
            width: 100%;
            height: 100%;
            position: relative;
            background: transparent;
        }

        #app .amll-lyric-player {
            background: transparent !important;
            color: #f5f7ff;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.35);
            mix-blend-mode: plus-lighter !important;
            -webkit-text-fill-color: #f5f7ff;
            --amll-lp-color: #f5f7ff;
            --amll-lp-bg-color: rgba(0, 0, 0, 0.28);
            --amll-lp-hover-bg-color: rgba(255, 255, 255, 0.12);
            --amll-lp-font-size: clamp(20px, 5.2vh, 52px);
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <script>
        if (typeof Android !== 'undefined' && Android?.log) {
            Android.log('[AMLL-INIT] index.html loaded')
        }
    </script>
    <script src="./amll.bundle.js"></script>
</body>
</html>
